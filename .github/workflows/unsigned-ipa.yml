name: Build unsigned iOS IPA (for AltStore sideload)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS dependencies
        run: npm ci

      - name: Prebuild native iOS project
        run: npx expo prebuild --platform ios --no-install

      - name: Disable code signing for all CocoaPods targets
        run: |
          ruby -e '
            content = File.read("ios/Podfile")
            injection = <<~RUBY
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"
                  config.build_settings["CODE_SIGNING_REQUIRED"] = "NO"
                  config.build_settings["CODE_SIGN_IDENTITY"] = ""
                end
              end
            RUBY
            updated = content.sub(/post_install do \|installer\|/) { |match| "#{match}\n#{injection}" }
            raise "post_install hook not found in Podfile" if updated == content
            File.write("ios/Podfile", updated)
          '

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build unsigned .app
        working-directory: ios
        run: |
          WORKSPACE=$(ls *.xcworkspace | head -1)
          SCHEME=$(xcodebuild -workspace "$WORKSPACE" -list -json | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).workspace.schemes[0]))")
          echo "Building $SCHEME from $WORKSPACE"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            clean build

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find ios/build/Build/Products -maxdepth 1 -iname "*.app" | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r TruggTutor-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: TruggTutor-unsigned-ipa
          path: TruggTutor-unsigned.ipa
          retention-days: 14
